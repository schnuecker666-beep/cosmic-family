<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0f0e17;--surface:#1a1a2e;--surface2:#16213e;--surface3:#0f3460;
  --accent:#7c3aed;--accent2:#a855f7;--accent3:#c084fc;
  --gold:#f59e0b;--gold2:#fcd34d;
  --green:#10b981;--green2:#34d399;
  --red:#ef4444;--red2:#fca5a5;
  --blue:#3b82f6;--blue2:#93c5fd;
  --text:#f8fafc;--text2:#94a3b8;--text3:#475569;
  --border:#1e293b;--border2:#334155;
  --radius:16px;--radius-sm:10px;--radius-xs:6px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.on{display:flex;}

/* Header */
.hdr{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-bottom:1px solid var(--border);}
.hdr-title{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hdr-sub{font-size:12px;color:var(--text2);margin-top:2px;}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border-radius:var(--radius-sm);border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;width:100%;}
.btn:active{transform:scale(.97);}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border2);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-success{background:linear-gradient(135deg,#059669,var(--green));color:#fff;}
.btn-sm{padding:10px 16px;font-size:14px;}
.btn+.btn{margin-top:10px;}

/* Cards */
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin-bottom:12px;}
.card-sm{background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border);padding:14px;margin-bottom:10px;}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.badge-purple{background:#4c1d95;color:var(--accent3);}
.badge-gold{background:#78350f;color:var(--gold2);}
.badge-green{background:#064e3b;color:var(--green2);}
.badge-blue{background:#1e3a5f;color:var(--blue2);}
.badge-red{background:#7f1d1d;color:var(--red2);}

/* Progress */
.progress-wrap{background:var(--border);border-radius:10px;height:8px;overflow:hidden;}
.progress-fill{height:100%;border-radius:10px;transition:width .4s;}

/* XP Bar */
.xp-bar-wrap{background:var(--border);border-radius:4px;height:6px;overflow:hidden;margin:4px 0;}
.xp-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .4s;}

/* Avatar */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;}

/* Stat boxes */
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-box{background:var(--surface2);border-radius:var(--radius-sm);padding:14px;text-align:center;border:1px solid var(--border);}
.stat-val{font-size:26px;font-weight:700;}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:3px;}

/* Tabs */
.tab-row{display:flex;background:var(--surface2);border-radius:var(--radius-sm);padding:4px;gap:4px;margin-bottom:16px;}
.tab{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s;}
.tab.on{background:var(--accent);color:#fff;}

/* Lang selector */
.lang-row{display:flex;gap:10px;margin-bottom:16px;}
.lang-btn{flex:1;padding:12px;border-radius:var(--radius-sm);border:2px solid var(--border2);background:var(--surface2);font-size:14px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .2s;text-align:center;}
.lang-btn.on{border-color:var(--accent);background:#2d1f6e;color:var(--accent3);}

/* Level pills */
.level-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.level-pill{padding:8px 16px;border-radius:20px;border:2px solid var(--border2);background:var(--surface2);font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .2s;}
.level-pill.on{border-color:var(--gold);background:#3d2a00;color:var(--gold2);}

/* Lesson card */
.lesson-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .2s;}
.lesson-card:active{transform:scale(.98);}
.lesson-card.locked{opacity:.5;cursor:not-allowed;}
.lesson-card.done{border-color:#064e3b;}
.lesson-icon{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.lesson-info{flex:1;min-width:0;}
.lesson-title{font-size:16px;font-weight:700;margin-bottom:3px;}
.lesson-sub{font-size:12px;color:var(--text2);}
.lesson-check{width:30px;height:30px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lesson-check.done{background:var(--green);border-color:var(--green);}

/* Exercise screen */
.ex-header{padding:16px 20px;display:flex;align-items:center;gap:12px;background:var(--surface);border-bottom:1px solid var(--border);}
.ex-progress{flex:1;background:var(--border);border-radius:4px;height:8px;overflow:hidden;}
.ex-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .4s;}
.ex-content{flex:1;padding:20px;overflow-y:auto;}
.ex-question{font-size:13px;color:var(--text2);text-align:center;margin-bottom:8px;font-weight:500;letter-spacing:.5px;text-transform:uppercase;}
.ex-word{font-size:36px;font-weight:700;text-align:center;margin:16px 0 6px;color:var(--text);}
.ex-context{font-size:14px;color:var(--text2);text-align:center;font-style:italic;margin-bottom:24px;}
.option{display:block;width:100%;padding:16px 18px;border-radius:var(--radius-sm);border:2px solid var(--border2);background:var(--surface2);font-size:16px;font-weight:500;cursor:pointer;text-align:left;margin-bottom:10px;transition:all .2s;color:var(--text);}
.option:active{transform:scale(.98);}
.option.correct{border-color:var(--green);background:#064e3b;color:var(--green2);}
.option.wrong{border-color:var(--red);background:#7f1d1d;color:var(--red2);}
.option.reveal{border-color:var(--green);background:#064e3b;color:var(--green2);}

/* Answer input */
.ans-input{width:100%;padding:16px;border-radius:var(--radius-sm);border:2px solid var(--border2);background:var(--surface2);font-size:18px;color:var(--text);outline:none;text-align:center;}
.ans-input:focus{border-color:var(--accent);}
.ans-input.correct{border-color:var(--green);background:#064e3b;}
.ans-input.wrong{border-color:var(--red);background:#7f1d1d;}

/* Feedback */
.feedback{border-radius:var(--radius-sm);padding:14px 16px;margin:12px 0;display:none;}
.feedback.show{display:block;}
.feedback.correct{background:#064e3b;border:1px solid var(--green);color:var(--green2);}
.feedback.wrong{background:#7f1d1d;border:1px solid var(--red);color:var(--red2);}
.feedback-title{font-size:16px;font-weight:700;margin-bottom:4px;}
.feedback-text{font-size:14px;opacity:.9;}

/* Spell boxes */
.spell-boxes{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:16px 0;}
.spell-box{min-width:38px;height:48px;border-radius:10px;border:2px solid var(--border2);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:var(--text);cursor:pointer;padding:0 6px;}
.spell-box.filled{border-color:var(--accent);background:#2d1f6e;color:var(--accent3);}
.spell-box.correct{border-color:var(--green);background:#064e3b;color:var(--green2);}
.spell-box.wrong{border-color:var(--red);background:#7f1d1d;color:var(--red2);}
.letter-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:12px 0;}
.letter-btn{width:46px;height:46px;border-radius:10px;border:2px solid var(--border2);background:var(--surface2);font-size:18px;font-weight:700;cursor:pointer;color:var(--text);transition:all .15s;}
.letter-btn.used{opacity:.25;}
.letter-btn:active{transform:scale(.9);}

/* Grammar card */
.grammar-card{background:linear-gradient(135deg,#1e1b4b,#2d1f6e);border:1px solid var(--accent);border-radius:var(--radius);padding:20px;margin-bottom:16px;}
.grammar-title{font-size:18px;font-weight:700;color:var(--accent3);margin-bottom:10px;}
.grammar-rule{font-size:15px;color:var(--text);line-height:1.7;margin-bottom:8px;}
.grammar-example{background:rgba(0,0,0,.3);border-radius:var(--radius-xs);padding:10px 14px;font-size:14px;color:var(--text2);font-style:italic;margin-top:8px;}

/* Result */
.result-emoji{font-size:72px;text-align:center;margin:20px 0;}
.result-title{font-size:28px;font-weight:700;text-align:center;background:linear-gradient(135deg,var(--accent2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px;}
.result-sub{font-size:15px;color:var(--text2);text-align:center;margin-bottom:24px;}

/* Nav */
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 12px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:10px;font-weight:600;transition:color .2s;}
.nav-btn.on{color:var(--accent2);}
.nav-icon{font-size:22px;}

/* Profile list */
.profile-item{display:flex;align-items:center;gap:14px;padding:14px;background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:10px;cursor:pointer;transition:all .2s;}
.profile-item:active{transform:scale(.98);}
.profile-item.active-profile{border-color:var(--accent);}

/* Streak flame */
.streak-display{text-align:center;padding:24px;background:linear-gradient(135deg,#78350f,#92400e);border-radius:var(--radius);margin-bottom:16px;border:1px solid var(--gold);}
.streak-num{font-size:56px;font-weight:700;color:var(--gold2);}

/* Color picker */
.color-dot{width:38px;height:38px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s;flex-shrink:0;}
.color-dot.sel{border-color:#fff;transform:scale(1.1);}

/* Misc */
.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
.empty{text-align:center;padding:40px 20px;color:var(--text2);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.section-title{font-size:18px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.back-btn{background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;padding:0;line-height:1;}
.scroll{flex:1;overflow-y:auto;padding:20px;}
.content{flex:1;padding:20px;overflow-y:auto;}

/* Placement test */
.test-question{font-size:20px;font-weight:600;text-align:center;margin:20px 0;color:var(--text);}
.test-progress{font-size:13px;color:var(--text2);text-align:center;margin-bottom:16px;}

/* Animations */
@keyframes popIn{0%{transform:scale(.5);opacity:0;}80%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
.pop{animation:popIn .3s ease;}
.shake{animation:shake .3s ease;}

/* Tooltip/hint */
.hint-box{background:#1e1b4b;border:1px solid var(--accent);border-radius:var(--radius-xs);padding:10px 14px;font-size:13px;color:var(--accent3);margin-top:8px;display:none;}
.hint-box.show{display:block;}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--text2);}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* TTS button */
.tts-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;margin:0 auto 16px;}

/* Word type tag */
.word-type{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:var(--surface3);color:var(--blue2);margin-bottom:8px;}
</style>
</head>

<!-- ══════════════ SCREEN: SPLASH ══════════════ -->
<div id="s-splash" class="screen on" style="align-items:center;justify-content:center;background:linear-gradient(135deg,#0f0e17,#1a1a2e,#0f3460);">
  <div style="text-align:center;padding:40px;">
    <div style="font-size:72px;margin-bottom:16px;">🌍</div>

    <div style="font-size:16px;color:#94a3b8;margin-bottom:40px;">Sprachen lernen für die ganze Familie</div>

  </div>

    <div><div class="hdr-title">LinguaFamily 🌍</div><div class="hdr-sub">Wer lernt heute?</div></div>

  </div>
  <div class="scroll" id="profile-list"></div>
</div>

<!-- ══════════════ SCREEN: ADD PROFILE ══════════════ -->
<div id="s-add-profile" class="screen">
  <div class="hdr">
    <button class="back-btn" onclick="showScreen('s-profiles')">←</button>
    <div style="flex:1;margin-left:12px;"><div class="hdr-title">Neues Profil</div></div>
  </div>
  <div class="scroll">
    <div class="card">
      <div style="text-align:center;margin-bottom:20px;">
        <div class="avatar" id="ap-preview" style="width:72px;height:72px;font-size:26px;margin:0 auto 8px;background:#7c3aed;">?</div>
      </div>
      <div style="margin-bottom:14px;"><label style="font-size:13px;color:var(--text2);display:block;margin-bottom:6px;font-weight:600;">NAME</label><input id="ap-name" style="width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:var(--surface2);font-size:16px;color:var(--text);outline:none;" placeholder="z.B. Papa, Emma, Lukas..." maxlength="20" oninput="apUpdatePreview()"></div>
      <div style="margin-bottom:14px;"><label style="font-size:13px;color:var(--text2);display:block;margin-bottom:8px;font-weight:600;">FARBE</label><div style="display:flex;gap:10px;flex-wrap:wrap;" id="ap-colors"></div></div>
    </div>
    <button class="btn btn-primary" onclick="createProfile()">Profil erstellen ✓</button>
  </div>
</div>

<!-- ══════════════ SCREEN: PLACEMENT TEST ══════════════ -->
<div id="s-placement" class="screen">
  <div class="hdr">
    <button class="back-btn" onclick="showScreen('s-profiles')">←</button>
    <div style="flex:1;margin-left:12px;"><div class="hdr-title">Einstufungstest</div><div class="hdr-sub" id="pt-lang-sub"></div></div>
  </div>
  <div class="scroll">
    <div class="card" style="background:linear-gradient(135deg,#1e1b4b,#2d1f6e);border-color:var(--accent);">

    </div>
    <div id="pt-content"></div>
  </div>
</div>

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function navTo(page){
  const map={home:'s-home',learn:'s-learn',vocab:'s-vocab',stats:'s-stats'};
  showScreen(map[page]);
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll(`[id^="nav-${page}"]`).forEach(b=>b.classList.add('on'));
  if(page==='home')renderHome();
  if(page==='learn')renderLearn();
  if(page==='vocab')renderVocab();
  if(page==='stats')renderStats();
}

function renderProfiles(){
  const el=document.getElementById('profile-list');
  const keys=Object.keys(profiles);
  if(!keys.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">👤</div><div style="font-size:18px;font-weight:600;margin-bottom:8px;">Noch kein Profil</div><div style="color:var(--text2);margin-bottom:24px;">Erstelle dein erstes Profil um zu starten!</div><button class="btn btn-primary" onclick="showScreen('s-add-profile')">Profil erstellen</button></div>`;
    return;
  }
  el.innerHTML=keys.map(k=>{
    const p=profiles[k];
    const streak=getStreak(k);
    const totalXP=p.xp||0;
    const level=getLevel(totalXP);
    return`<div class="profile-item ${k===curProfileId?'active-profile':''}" onclick="selectProfile('${k}')">
      <div class="avatar" style="background:${p.color};width:52px;height:52px;font-size:20px;">${p.name.slice(0,2).toUpperCase()}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:17px;font-weight:700;margin-bottom:2px;">${p.name}</div>
        <div style="font-size:12px;color:var(--text2);">Level ${level} · ${totalXP} XP · 🔥 ${streak} Tage</div>
        <div class="xp-bar-wrap" style="margin-top:6px;"><div class="xp-bar" style="width:${Math.min((totalXP%500)/5,100)}%;"></div></div>
      </div>
      <div style="text-align:right;font-size:20px;">›</div>
    </div>`;
  }).join('');
}

function selectProfile(id){
  curProfileId=id;saveCur();
  const p=profiles[id];
  // Check if needs placement test for either lang
  if(!p.levels||!p.levels.en||!p.levels.es){
    // First time – ask which lang to start with
    showLangSelect(id);
  } else {
    goHome();
  }
}

function showLangSelect(id){
  const p=profiles[id];
  const el=document.getElementById('profile-list');
  el.innerHTML=`<div class="card" style="background:linear-gradient(135deg,#1e1b4b,#2d1f6e);border-color:var(--accent);">
    <div style="font-size:20px;font-weight:700;margin-bottom:8px;">Willkommen, ${p.name}! 🎉</div>
    <div style="font-size:14px;color:var(--text2);margin-bottom:20px;">Welche Sprache möchtest du zuerst lernen?</div>
    <button class="btn btn-primary" onclick="startPlacement('en')" style="margin-bottom:10px;">🇬🇧 Englisch lernen</button>
    <button class="btn btn-secondary" onclick="startPlacement('es')">🇪🇸 Spanisch lernen</button>
    ${(p.levels&&(p.levels.en||p.levels.es))?`<button class="btn btn-ghost" onclick="goHome()" style="margin-top:10px;">Weiter ohne Test</button>`:''}
  </div>`;
}

function startPlacement(lang){
  ptLang=lang;ptAnswers=[];ptIdx=0;
  document.getElementById('pt-lang-sub').textContent=lang==='en'?'🇬🇧 Englisch':'🇪🇸 Spanisch';
  showScreen('s-placement');
  renderPlacement();
}

function renderPlacement(){
  const q=PLACEMENT[ptLang][ptIdx];
  const el=document.getElementById('pt-content');
  el.innerHTML=`<div class="test-progress">Frage ${ptIdx+1} von ${PLACEMENT[ptLang].length}</div>
    <div class="progress-wrap" style="margin-bottom:20px;"><div class="progress-fill" style="width:${(ptIdx/PLACEMENT[ptLang].length)*100}%;background:var(--accent);"></div></div>
    <div class="card">
      <div class="test-question">${q.q}</div>
      ${q.opts.map(o=>`<button class="option" onclick="ptAnswer('${o}')">${o}</button>`).join('')}
    </div>`;
}

function ptAnswer(ans){
  const q=PLACEMENT[ptLang][ptIdx];
  ptAnswers.push({correct:ans===q.ans,level:q.level});
  ptIdx++;
  if(ptIdx>=PLACEMENT[ptLang].length){
    finishPlacement();
  } else {
    renderPlacement();
  }
}

function finishPlacement(){
  const levelScores={A1:0,A2:0,B1:0,B2:0,C1:0};
  ptAnswers.forEach(a=>{if(a.correct)levelScores[a.level]++;});
  let detectedLevel='A1';
  if(levelScores.C1>=1)detectedLevel='C1';
  else if(levelScores.B2>=1)detectedLevel='B2';
  else if(levelScores.B1>=1)detectedLevel='B1';
  else if(levelScores.A2>=1)detectedLevel='A2';

  const correct=ptAnswers.filter(a=>a.correct).length;

  document.getElementById('pt-content').innerHTML=`<div class="card" style="text-align:center;padding:24px;">
    <div style="font-size:48px;margin-bottom:12px;">🎯</div>
    <div style="font-size:18px;font-weight:700;margin-bottom:4px;">Testergebnis: ${detectedLevel}</div>
    <div style="font-size:14px;color:var(--text2);margin-bottom:20px;">${correct} von ${ptAnswers.length} richtig</div>
    <div style="font-size:15px;font-weight:600;color:var(--accent3);margin-bottom:12px;">Wähle dein Startniveau:</div>
    ${LEVELS.map(lv=>`<button class="btn ${lv===detectedLevel?'btn-primary':'btn-secondary'}" onclick="confirmLevel('${lv}')" style="margin-bottom:8px;">
      <span style="background:${LEVEL_COLORS[lv]};padding:2px 8px;border-radius:6px;font-size:12px;margin-right:8px;">${lv}</span>
      ${LEVEL_NAMES[lv]}
      ${lv===detectedLevel?'← Empfohlen':''}
    </button>`).join('')}
  </div>`;
}

function confirmLevel(level){
  const p=profiles[curProfileId];
  if(!p.levels)p.levels={};
  p.levels[ptLang]=level;
  if(!p.progress)p.progress={};
  if(!p.progress[ptLang])p.progress[ptLang]={};
  if(!p.srs)p.srs={};
  saveProfiles();

  document.getElementById('pt-content').innerHTML=`<div class="card" style="text-align:center;padding:30px;background:linear-gradient(135deg,#064e3b,#065f46);border-color:var(--green);">
    <div style="font-size:56px;margin-bottom:12px;">✅</div>
    <div style="font-size:22px;font-weight:700;color:var(--green2);margin-bottom:8px;">Niveau: ${level}</div>
    <div style="font-size:15px;color:var(--text2);margin-bottom:24px;">${LEVEL_NAMES[level]}</div>
    <button class="btn btn-success" onclick="goHome()">Jetzt lernen! 🚀</button>
  </div>`;
}

function goHome(){

function getStreak(pid){
  const p=profiles[pid];if(!p||!p.lastDate)return 0;
  const today=new Date().toDateString();
  const yest=new Date(Date.now()-86400000).toDateString();
  if(p.lastDate===today)return p.streak||0;
  if(p.lastDate===yest)return p.streak||0;
  return 0;
}

function getLevel(xp){return Math.floor(xp/500)+1;}

function getDueCount(pid,lang){
  const p=profiles[pid];if(!p||!p.srs||!p.srs[lang])return 0;
  const now=Date.now();
  return Object.values(p.srs[lang]).filter(v=>!v.nextReview||v.nextReview<=now).length;
}

// EXERCISE ENGINE
// ═══════════════════════════════════════════════════════
function startLesson(lessonId,lang){
  const p=getCur();if(!p)return;
  const curriculum=CURRICULUM[lang];
  let lesson=null;
  Object.values(curriculum).forEach(lessons=>lessons.forEach(l=>{if(l.id===lessonId)lesson=l;}));
  if(!lesson)return;

  exLessonId=lessonId;
  exLessonTitle=lesson.title;
  exLives=3;exCorrect=0;exIdx=0;exAnswered=false;

  // Build exercise sequence: grammar intro + word exercises
  exItems=[];

  // 1. Grammar intro
  exItems.push({type:'grammar',title:lesson.grammar,text:lesson.grammarText,example:lesson.grammarEx});

  // 2. Word exercises (mix of types)
  const words=lesson.words;
  words.forEach((w,i)=>{
    const types=['mc','translate','spell'];
    const t=types[i%types.length];
    exItems.push({type:t,word:w,lang,allWords:words});
  });

  // 3. Final review question
  exItems.push({type:'review',words:words.slice(0,4),lang});

  showScreen('s-exercise');
  renderExercise();
}

function renderExercise(){
  if(exIdx>=exItems.length){finishLesson();return;}
  const item=exItems[exIdx];
  const pct=Math.round((exIdx/exItems.length)*100);
  document.getElementById('ex-prog-fill').style.width=pct+'%';
  document.getElementById('ex-counter').textContent=`${exIdx+1}/${exItems.length}`;
  document.getElementById('ex-lives').textContent='❤️'.repeat(exLives);
  exAnswered=false;

  const content=document.getElementById('ex-content');
  const footer=document.getElementById('ex-footer');
  footer.innerHTML='';

  if(item.type==='grammar'){
    content.innerHTML=`<div class="grammar-card">
      <div class="grammar-title">📖 ${item.title}</div>
      <div class="grammar-rule">${item.text.replace(/\n/g,'<br>')}</div>
      <div class="grammar-example">${item.example}</div>
    </div>`;
    footer.innerHTML=`<button class="btn btn-primary" onclick="nextExercise()">Verstanden! Weiter →</button>`;
    return;
  }

  if(item.type==='mc'){
    const w=item.word;
    const target=item.lang==='en'?w.en:w.es;
    const wrong=item.allWords.filter(x=>x!==w).sort(()=>Math.random()-.5).slice(0,3).map(x=>item.lang==='en'?x.en:x.es);
    const opts=[target,...wrong].sort(()=>Math.random()-.5);
    content.innerHTML=`<div class="ex-question">WAS BEDEUTET AUF ${item.lang==='en'?'ENGLISCH':'SPANISCH'}?</div>
      <div class="ex-word">${w.de}</div>
      <div class="ex-context">${w.ex}</div>
      <div class="word-type">${w.type}</div>
      ${opts.map(o=>`<button class="option" onclick="mcAnswer(this,'${o.replace(/'/g,"\\'")}','${target.replace(/'/g,"\\'")}','${item.lang}','${w.de.replace(/'/g,"\\'")}','${target.replace(/'/g,"\\'")}','${w.ex.replace(/'/g,"\\'")}')"> ${o}</button>`).join('')}
      <div class="feedback" id="ex-feedback"></div>`;
    return;
  }

  if(item.type==='translate'){
    const w=item.word;
    const target=item.lang==='en'?w.en:w.es;
    content.innerHTML=`<div class="ex-question">ÜBERSETZE INS ${item.lang==='en'?'ENGLISCHE':'SPANISCHE'}</div>
      <div class="ex-word">${w.de}</div>
      <div class="word-type">${w.type}</div>
      <div class="ex-context" style="margin-bottom:16px;">${w.ex.replace(target,'___')}</div>
      <button class="tts-btn" onclick="speak('${target}','${item.lang}')" title="Aussprache">🔊</button>
      <input class="ans-input" id="tr-input" placeholder="${item.lang==='en'?'English answer...':'Respuesta en español...'}" onkeydown="if(event.key==='Enter')checkTranslate('${target.replace(/'/g,"\\'")}','${item.lang}','${w.de.replace(/'/g,"\\'")}','${w.ex.replace(/'/g,"\\'")}')">
      <div class="hint-box" id="tr-hint"></div>
      <div class="feedback" id="ex-feedback"></div>`;
    footer.innerHTML=`<div style="display:flex;gap:8px;">
      <button class="btn btn-ghost btn-sm" style="flex:1;" onclick="showHint('${target.replace(/'/g,"\\'")}')">💡 Hinweis</button>
      <button class="btn btn-primary" style="flex:2;" onclick="checkTranslate('${target.replace(/'/g,"\\'")}','${item.lang}','${w.de.replace(/'/g,"\\'")}','${w.ex.replace(/'/g,"\\'")}')">Prüfen ✓</button>
    </div>`;
    setTimeout(()=>document.getElementById('tr-input')?.focus(),100);
    return;
  }

  if(item.type==='spell'){
    const w=item.word;
    const target=(item.lang==='en'?w.en:w.es).toLowerCase().split('/')[0].trim();
    const letters=[...target].sort(()=>Math.random()-.5);
    const extras='aeiourstlnd'.split('').filter(c=>!target.includes(c)).sort(()=>Math.random()-.5).slice(0,3);
    const allLetters=[...letters,...extras].sort(()=>Math.random()-.5);
    window._spellAnswer=Array(target.length).fill('');
    window._spellTarget=target;
    window._spellUsed=[];
    window._spellLang=item.lang;
    window._spellWord=w;

    content.innerHTML=`<div class="ex-question">BUCHSTABIERE AUF ${item.lang==='en'?'ENGLISCH':'SPANISCH'}</div>
      <div class="ex-word">${w.de}</div>
      <div class="word-type">${w.type}</div>
      <button class="tts-btn" onclick="speak('${item.lang==='en'?w.en:w.es}','${item.lang}')">🔊</button>
      <div class="spell-boxes" id="spell-boxes">${target.split('').map((_,i)=>`<div class="spell-box" id="sb-${i}" onclick="removeSpellLetter(${i})"></div>`).join('')}</div>
      <div class="letter-grid">${allLetters.map((l,i)=>`<button class="letter-btn" id="sl-${i}" onclick="addSpellLetter(${i},'${l}')">${l.toUpperCase()}</button>`).join('')}<button class="letter-btn" onclick="spellBackspace()" style="width:auto;padding:0 12px;">⌫</button></div>
      <div class="feedback" id="ex-feedback"></div>`;
    return;
  }

  if(item.type==='review'){
    const w=item.words[Math.floor(Math.random()*item.words.length)];
    const target=item.lang==='en'?w.en:w.es;
    const wrong=item.words.filter(x=>x!==w).map(x=>item.lang==='en'?x.en:x.es);
    const opts=[target,...wrong].sort(()=>Math.random()-.5);
    content.innerHTML=`<div class="ex-question">🏁 ABSCHLUSSFRAGE</div>
      <div class="ex-word">${w.de}</div>
      <div class="ex-context">${w.ex}</div>
      ${opts.map(o=>`<button class="option" onclick="mcAnswer(this,'${o.replace(/'/g,"\\'")}','${target.replace(/'/g,"\\'")}','${item.lang}','${w.de.replace(/'/g,"\\'")}','${target.replace(/'/g,"\\'")}','${w.ex.replace(/'/g,"\\'")}')"> ${o}</button>`).join('')}
      <div class="feedback" id="ex-feedback"></div>`;
    return;
  }
}

function speak(text,lang){
  if(!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang==='en'?'en-US':'es-ES';
  u.rate=0.85;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function showHint(target){
  const hint=document.getElementById('tr-hint');
  if(hint){hint.textContent=`Tipp: "${target.slice(0,Math.ceil(target.length/2))}..."`;hint.classList.add('show');}
}

function mcAnswer(btn,chosen,correct,lang,de,en,ex){
  if(exAnswered)return;
  exAnswered=true;
  document.querySelectorAll('.option').forEach(b=>b.onclick=null);
  const ok=chosen===correct;
  btn.classList.add(ok?'correct':'wrong');
  if(!ok){
    document.querySelectorAll('.option').forEach(b=>{if(b.textContent.trim()===correct)b.classList.add('reveal');});
    exLives--;document.getElementById('ex-lives').textContent='❤️'.repeat(Math.max(0,exLives));
  } else {
    exCorrect++;
    addToSRS(de,lang,correct,ok);
  }
  showFeedback(ok,correct,ex);
  document.getElementById('ex-footer').innerHTML=`<button class="btn ${ok?'btn-success':'btn-primary'} pop" onclick="nextExercise()">${ok?'Weiter →':'Verstanden →'}</button>`;
}

function checkTranslate(correct,lang,de,ex){
  if(exAnswered)return;
  const input=document.getElementById('tr-input');
  if(!input)return;
  const val=input.value.trim().toLowerCase();
  const ans=correct.toLowerCase().replace(/[¡¿!?.,]/g,'');
  const ok=val.replace(/[¡¿!?.,]/g,'')===ans||val===correct.toLowerCase();
  exAnswered=true;
  input.classList.add(ok?'correct':'wrong');
  input.disabled=true;
  if(!ok){exLives--;document.getElementById('ex-lives').textContent='❤️'.repeat(Math.max(0,exLives));}
  else{exCorrect++;addToSRS(de,lang,correct,ok);}
  showFeedback(ok,correct,ex);
  document.getElementById('ex-footer').innerHTML=`<button class="btn ${ok?'btn-success':'btn-primary'} pop" onclick="nextExercise()">${ok?'Weiter →':'Verstanden →'}</button>`;
}

function showFeedback(ok,correct,ex){
  const fb=document.getElementById('ex-feedback');
  if(!fb)return;
  fb.className=`feedback ${ok?'correct':'wrong'} show`;
  fb.innerHTML=`<div class="feedback-title">${ok?'✅ Richtig!':'❌ Fast!'}</div><div class="feedback-text">${ok?`Gut gemacht! "${correct}" ist korrekt.`:`Die richtige Antwort ist: <strong>${correct}</strong>`}</div>`;
  if(ok){speak(correct,window._spellLang||'en');}
}

// Spell
function addSpellLetter(idx,letter){
  const first=window._spellAnswer.indexOf('');if(first===-1)return;
  window._spellAnswer[first]=letter;window._spellUsed[first]=idx;
  const box=document.getElementById('sb-'+first);
  if(box){box.textContent=letter.toUpperCase();box.classList.add('filled');box.dataset.src=idx;}
  document.getElementById('sl-'+idx)?.classList.add('used');
  if(window._spellAnswer.every(l=>l)){
    const typed=window._spellAnswer.join('');
    const ok=typed===window._spellTarget;
    if(ok){
      document.querySelectorAll('.spell-box').forEach(b=>b.classList.add('correct'));
      exCorrect++;
      addToSRS(window._spellWord.de,window._spellLang,window._spellTarget,true);
      showFeedback(true,window._spellTarget,'');
      document.getElementById('ex-footer').innerHTML=`<button class="btn btn-success pop" onclick="nextExercise()">Weiter →</button>`;
      speak(window._spellTarget,window._spellLang);
    } else {
      exLives--;document.getElementById('ex-lives').textContent='❤️'.repeat(Math.max(0,exLives));
      document.querySelectorAll('.spell-box').forEach(b=>{b.classList.add('wrong');});
      setTimeout(()=>{
        window._spellAnswer=Array(window._spellTarget.length).fill('');
        window._spellUsed=[];
        document.querySelectorAll('.spell-box').forEach(b=>{b.textContent='';b.classList.remove('filled','wrong','correct');});
        document.querySelectorAll('.letter-btn').forEach(b=>b.classList.remove('used'));
      },800);
    }
  }
}

function removeSpellLetter(boxIdx){
  if(!window._spellAnswer[boxIdx])return;
  const srcIdx=parseInt(document.getElementById('sb-'+boxIdx)?.dataset.src||'-1');
  window._spellAnswer[boxIdx]='';
  const box=document.getElementById('sb-'+boxIdx);
  if(box){box.textContent='';box.classList.remove('filled');delete box.dataset.src;}
  if(srcIdx>=0)document.getElementById('sl-'+srcIdx)?.classList.remove('used');
}

function spellBackspace(){
  const last=window._spellAnswer.map((l,i)=>l?i:-1).filter(i=>i>=0).pop();
  if(last!==undefined)removeSpellLetter(last);
}

// SRS (Spaced Repetition)
function addToSRS(de,lang,target,correct){
  const p=getCur();if(!p)return;
  if(!p.srs)p.srs={};
  if(!p.srs[lang])p.srs[lang]={};
  const key=de;
  const card=p.srs[lang][key]||{de,target,interval:1,easeFactor:2.5,repetitions:0,nextReview:Date.now()};
  if(correct){
    card.repetitions++;
    if(card.repetitions===1)card.interval=1;
    else if(card.repetitions===2)card.interval=6;
    else card.interval=Math.round(card.interval*card.easeFactor);
    card.easeFactor=Math.max(1.3,card.easeFactor+0.1);
  } else {
    card.repetitions=0;card.interval=1;card.easeFactor=Math.max(1.3,card.easeFactor-0.2);
  }
  card.nextReview=Date.now()+(card.interval*24*60*60*1000);
  p.srs[lang][key]=card;
  saveProfiles();
}

function nextExercise(){
  exIdx++;
  renderExercise();
}

function confirmExitExercise(){
  if(confirm('Übung abbrechen? Dein Fortschritt geht verloren.')){
    showScreen('s-learn');renderLearn();
  }
}

function finishLesson(){
  const p=getCur();if(!p)return;
  const lang=p.lastLang||'en';
  if(!p.progress)p.progress={};
  if(!p.progress[lang])p.progress[lang]={};
  p.progress[lang][exLessonId]=true;
  const xpGained=exCorrect*20+(exLives*50);
  p.xp=(p.xp||0)+xpGained;
  const today=new Date().toDateString();
  if(p.lastDate!==today){
    const yest=new Date(Date.now()-86400000).toDateString();
    p.streak=p.lastDate===yest?(p.streak||0)+1:1;
    p.lastDate=today;
  }
  saveProfiles();

  const pct=Math.round((exCorrect/(exItems.filter(i=>i.type!=='grammar').length))*100);
  showScreen('s-result');
  document.getElementById('result-content').innerHTML=`
    <div style="padding:30px 20px;text-align:center;">
      <div class="result-emoji">${pct>=80?'🏆':pct>=60?'🎉':'💪'}</div>
      <div class="result-title">${pct>=80?'Ausgezeichnet!':pct>=60?'Gut gemacht!':'Weiter üben!'}</div>
      <div class="result-sub">${exCorrect} Antworten richtig · ${exLives} Leben übrig</div>
      <div class="stat-row" style="margin:20px 0;">
        <div class="stat-box"><div class="stat-val" style="color:var(--gold);">+${xpGained}</div><div class="stat-lbl">XP verdient</div></div>
        <div class="stat-box"><div class="stat-val" style="color:var(--green);">${pct}%</div><div class="stat-lbl">Genauigkeit</div></div>
      </div>
      <div class="card" style="text-align:left;margin-bottom:16px;">
        <div style="font-size:14px;font-weight:600;color:var(--text2);margin-bottom:8px;">✨ NEUE VOKABELN GESPEICHERT</div>
        <div style="font-size:13px;color:var(--text2);">Die Vokabeln dieser Lektion wurden dem SRS-System hinzugefügt. Du wirst sie zur optimalen Zeit zur Wiederholung bekommen!</div>
      </div>
      <button class="btn btn-primary" onclick="navTo('learn')" style="margin-bottom:10px;">Nächste Lektion →</button>
      <button class="btn btn-secondary" onclick="navTo('home')">Zum Start</button>
    </div>`;
}

// VOCAB (SRS Review)
// ═══════════════════════════════════════════════════════
function renderVocab(){
  const p=getCur();if(!p)return;
  const lang=p.lastLang||'en';
  document.getElementById('vocab-sub').textContent=lang==='en'?'🇬🇧 Englisch':'🇪🇸 Spanisch';

  const srs=p.srs?.[lang]||{};
  const now=Date.now();
  const due=Object.values(srs).filter(c=>!c.nextReview||c.nextReview<=now);
  const upcoming=Object.values(srs).filter(c=>c.nextReview>now).sort((a,b)=>a.nextReview-b.nextReview);

  if(!Object.keys(srs).length){
    document.getElementById('vocab-content').innerHTML=`
      <div class="lang-row">
        <button class="lang-btn ${lang==='en'?'on':''}" onclick="changeVocabLang('en')">🇬🇧 Englisch</button>
        <button class="lang-btn ${lang==='es'?'on':''}" onclick="changeVocabLang('es')">🇪🇸 Spanisch</button>
      </div>
      <div class="empty"><div class="empty-icon">🃏</div><div style="font-size:17px;font-weight:600;margin-bottom:8px;">Noch keine Vokabeln</div><div style="color:var(--text2);margin-bottom:20px;">Absolviere zuerst eine Lektion, um Vokabeln zu sammeln!</div><button class="btn btn-primary" onclick="navTo('learn')">Zur Lektion →</button></div>`;
    return;
  }

  let html=`<div class="lang-row">
    <button class="lang-btn ${lang==='en'?'on':''}" onclick="changeVocabLang('en')">🇬🇧 Englisch</button>
    <button class="lang-btn ${lang==='es'?'on':''}" onclick="changeVocabLang('es')">🇪🇸 Spanisch</button>
  </div>`;

  html+=`<div class="stat-row">
    <div class="stat-box"><div class="stat-val" style="color:${due.length>0?'var(--red)':'var(--green)'};">${due.length}</div><div class="stat-lbl">Zu wiederholen</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--blue2);">${Object.keys(srs).length}</div><div class="stat-lbl">Gesamt</div></div>
  </div>`;

  if(due.length>0){
    html+=`<button class="btn btn-primary" onclick="startSRS('${lang}')" style="margin-bottom:16px;">🃏 Jetzt ${due.length} Vokabel${due.length!==1?'n':''} wiederholen</button>`;
  } else {
    html+=`<div class="card" style="background:#064e3b;border-color:var(--green);text-align:center;padding:20px;margin-bottom:16px;"><div style="font-size:32px;margin-bottom:8px;">✅</div><div style="font-size:16px;font-weight:600;color:var(--green2);">Alles wiederholt!</div><div style="font-size:13px;color:var(--text2);margin-top:4px;">Keine fälligen Vokabeln. Komm morgen wieder!</div></div>`;
  }

  if(upcoming.length>0){
    html+=`<div class="section-title">Nächste Wiederholungen</div>`;
    upcoming.slice(0,5).forEach(c=>{
      const hrs=Math.ceil((c.nextReview-now)/3600000);
      html+=`<div class="card-sm" style="display:flex;justify-content:space-between;align-items:center;"><div><div style="font-weight:600;">${c.de}</div><div style="font-size:13px;color:var(--text2);">${c.target}</div></div><span class="badge badge-blue">in ${hrs<24?hrs+'h':Math.ceil(hrs/24)+'d'}</span></div>`;
    });
  }

  document.getElementById('vocab-content').innerHTML=html;
}

function changeVocabLang(lang){
  const p=getCur();if(!p)return;
  p.lastLang=lang;saveProfiles();renderVocab();
}

function startSRS(lang){
  const p=getCur();if(!p)return;
  const srs=p.srs?.[lang]||{};
  const now=Date.now();
  srsItems=Object.values(srs).filter(c=>!c.nextReview||c.nextReview<=now).sort(()=>Math.random()-.5);
  srsIdx=0;
  if(!srsItems.length)return;

  exLives=3;exCorrect=0;exAnswered=false;
  exLessonId='srs';exLessonTitle='Vokabelwiederholung';

  // Build SRS exercises
  exItems=srsItems.map(card=>({type:'mc',word:{de:card.de,en:card.target,es:card.target,type:'',ex:card.de},lang,allWords:srsItems.slice(0,10).map(c=>({de:c.de,en:c.target,es:c.target,type:'',ex:''}))}));

  showScreen('s-exercise');renderExercise();
}

// ═══════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════
function renderStats(){
  const p=getCur();if(!p)return;
  const streak=getStreak(curProfileId);
  const lv=getLevel(p.xp||0);
  const xpToNext=500-(p.xp%500);
  const enProgress=Object.keys(p.progress?.en||{}).length;
  const esProgress=Object.keys(p.progress?.es||{}).length;
  const enSRS=Object.keys(p.srs?.en||{}).length;
  const esSRS=Object.keys(p.srs?.es||{}).length;

  // Family highscore
  const all=Object.entries(profiles).sort(([,a],[,b])=>(b.xp||0)-(a.xp||0));

  let html=`<div class="streak-display"><div style="font-size:13px;color:var(--gold2);margin-bottom:4px;font-weight:600;">🔥 STREAK</div><div class="streak-num">${streak}</div><div style="font-size:14px;color:var(--gold2);">Tage in Folge</div></div>`;

  html+=`<div class="stat-row">
    <div class="stat-box"><div class="stat-val" style="color:var(--accent2);">${lv}</div><div class="stat-lbl">Level</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--gold);">${p.xp||0}</div><div class="stat-lbl">Gesamt-XP</div></div>
  </div>`;

  html+=`<div class="card" style="margin-bottom:12px;">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="font-size:14px;color:var(--text2);">XP bis Level ${lv+1}</span><span style="font-size:14px;font-weight:600;">${xpToNext} XP</span></div>
    <div class="progress-wrap"><div class="progress-fill" style="width:${Math.round(((500-xpToNext)/500)*100)}%;background:linear-gradient(90deg,var(--accent),var(--accent2));"></div></div>
  </div>`;

  html+=`<div class="section-title">Sprachenfortschritt</div>
  <div class="card-sm" style="margin-bottom:8px;">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span>🇬🇧 Englisch · <strong>${p.levels?.en||'–'}</strong></span><span style="font-size:13px;color:var(--text2);">${enProgress} Lektionen</span></div>
    <div class="progress-wrap"><div class="progress-fill" style="width:${Math.min(enProgress*10,100)}%;background:var(--blue);"></div></div>
    <div style="font-size:12px;color:var(--text2);margin-top:6px;">📚 ${enSRS} Vokabeln gelernt</div>
  </div>
  <div class="card-sm">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span>🇪🇸 Spanisch · <strong>${p.levels?.es||'–'}</strong></span><span style="font-size:13px;color:var(--text2);">${esProgress} Lektionen</span></div>
    <div class="progress-wrap"><div class="progress-fill" style="width:${Math.min(esProgress*10,100)}%;background:var(--accent);"></div></div>
    <div style="font-size:12px;color:var(--text2);margin-top:6px;">📚 ${esSRS} Vokabeln gelernt</div>
  </div>`;

  html+=`<div class="section-title" style="margin-top:8px;">🏆 Familien-Rangliste</div>`;
  const medals=['🥇','🥈','🥉'];
  all.forEach(([id,pp],i)=>{
    html+=`<div class="card-sm" style="display:flex;align-items:center;gap:12px;border-color:${id===curProfileId?'var(--accent)':'var(--border)'};">
      <div style="font-size:22px;width:30px;">${medals[i]||'#'+(i+1)}</div>
      <div class="avatar" style="background:${pp.color};width:38px;height:38px;font-size:14px;">${pp.name.slice(0,2).toUpperCase()}</div>
      <div style="flex:1;"><div style="font-weight:600;">${pp.name}</div><div style="font-size:12px;color:var(--text2);">Level ${getLevel(pp.xp||0)} · 🔥${getStreak(id)}</div></div>
      <div style="font-size:18px;font-weight:700;color:var(--gold);">${pp.xp||0} XP</div>
    </div>`;
  });

  document.getElementById('stats-content').innerHTML=html;
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
function init(){
  renderProfiles();
  renderAddProfile();
  // Show splash for 1.5s then profiles
  setTimeout(()=>{
    showScreen('s-profiles');
    renderProfiles();
  },1500);
}
init();
</script>
